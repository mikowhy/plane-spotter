<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plane Spotter by @mikowhy</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        .top { display: flex; flex: 1; min-height: 0; }
        .stream-panel { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .stream-panel img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .map-panel { flex: 1; }
        #map { width: 100%; height: 100%; }

        .bottom { height: 120px; background: #16213e; padding: 12px 20px; display: flex; gap: 30px; align-items: center; border-top: 2px solid #0f3460; }
        .flight-info { display: flex; gap: 30px; flex-wrap: wrap; }
        .field { display: flex; flex-direction: column; }
        .field .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .field .value { font-size: 18px; color: #e94560; font-weight: bold; }

        .notification { position: fixed; top: 20px; right: 20px; background: #e94560; color: #fff; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; font-weight: bold; }

        .map-counter { background: rgba(22, 33, 62, 0.85); color: #e94560; font-family: monospace; font-size: 24px; font-weight: bold; padding: 10px 18px; border-radius: 6px; border: 1px solid #0f3460; }
    </style>
</head>
<body>

<div class="top">
    <div class="stream-panel">
        <img src="/stream" alt="Camera stream" />
    </div>
    <div class="map-panel">
        <div id="map"></div>
    </div>
</div>

<div class="bottom">
    <div class="flight-info" id="flight-info">
        <div class="field"><span class="label">Callsign</span><span class="value" id="f-callsign">--</span></div>
        <div class="field"><span class="label">Country</span><span class="value" id="f-country">--</span></div>
        <div class="field"><span class="label">Altitude</span><span class="value" id="f-altitude">--</span></div>
        <div class="field"><span class="label">Speed</span><span class="value" id="f-speed">--</span></div>
        <div class="field"><span class="label">Heading</span><span class="value" id="f-heading">--</span></div>
        <div class="field"><span class="label">Vertical Rate</span><span class="value" id="f-vrate">--</span></div>
    </div>
</div>

<div class="notification" id="notification"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Map setup
    const HOME = [52.403845, 16.863415];
    const AIRPORT = [52.4205, 16.8310];

    const map = L.map('map').setView(HOME, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Markers
    L.marker(HOME, { title: 'Home' })
        .bindPopup('Home')
        .addTo(map);

    L.marker(AIRPORT, { title: 'Lawica Airport (EPPO)' })
        .bindPopup('Lawica Airport (EPPO)')
        .addTo(map);

    // Aircraft count control on map
    const CountControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
            const div = L.DomUtil.create('div', 'map-counter');
            div.id = 'map-ac-count';
            div.textContent = '0 aircraft tracked';
            return div;
        }
    });
    new CountControl().addTo(map);

    // Aircraft markers layer
    const aircraftLayer = L.layerGroup().addTo(map);
    let previousNearby = new Set();

    function updateFlights() {
        fetch('/flights')
            .then(r => r.json())
            .then(data => {
                // Update count
                document.getElementById('map-ac-count').textContent = data.aircraft.length + ' aircraft tracked';

                // Update map markers
                aircraftLayer.clearLayers();
                data.aircraft.forEach(ac => {
                    if (ac.latitude && ac.longitude) {
                        const marker = L.circleMarker([ac.latitude, ac.longitude], {
                            radius: 6,
                            color: '#e94560',
                            fillColor: '#e94560',
                            fillOpacity: 0.8,
                        });
                        marker.bindPopup(
                            `<b>${ac.callsign || ac.icao24}</b><br>` +
                            `Alt: ${ac.baro_altitude ? Math.round(ac.baro_altitude) + 'm' : '?'}<br>` +
                            `Speed: ${ac.velocity ? Math.round(ac.velocity * 3.6) + ' km/h' : '?'}`
                        );
                        aircraftLayer.addLayer(marker);
                    }
                });

                // Update flight panel with closest approaching aircraft
                const ac = data.approaching.length > 0 ? data.approaching[0] : null;
                document.getElementById('f-callsign').textContent = ac?.callsign || '--';
                document.getElementById('f-country').textContent = ac?.origin_country || '--';
                document.getElementById('f-altitude').textContent = ac?.baro_altitude ? Math.round(ac.baro_altitude) + 'm' : '--';
                document.getElementById('f-speed').textContent = ac?.velocity ? Math.round(ac.velocity * 3.6) + ' km/h' : '--';
                document.getElementById('f-heading').textContent = ac?.true_track ? Math.round(ac.true_track) + '\u00B0' : '--';
                document.getElementById('f-vrate').textContent = ac?.vertical_rate ? ac.vertical_rate.toFixed(1) + ' m/s' : '--';

                // Notification for nearby aircraft
                const currentNearby = new Set(data.nearby.map(a => a.icao24));
                currentNearby.forEach(id => {
                    if (!previousNearby.has(id)) {
                        const nearby = data.nearby.find(a => a.icao24 === id);
                        showNotification(nearby?.callsign || id);
                    }
                });
                previousNearby = currentNearby;
            })
            .catch(err => console.error('Flight fetch error:', err));
    }

    function showNotification(callsign) {
        const el = document.getElementById('notification');
        el.textContent = 'Aircraft nearby: ' + callsign;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);

        if (Notification.permission === 'granted') {
            new Notification('Plane Spotter', { body: 'Aircraft nearby: ' + callsign });
        }
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }

    // Poll every 15 seconds
    updateFlights();
    setInterval(updateFlights, 15000);
</script>

</body>
</html>
